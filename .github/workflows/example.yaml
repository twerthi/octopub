name: Scheduled Echo Example

on:
  schedule:
    # Triggers the workflow every 15 minutes (UTC)
    - cron: '*/15 * * * *'
  
  # Allows you to manually trigger the workflow from the Actions tab
  workflow_dispatch:

jobs:
  echo-job:
    runs-on: ubuntu-latest
    steps:
      - name: Print a message
        run: echo "Hello! This cron job ran successfully."