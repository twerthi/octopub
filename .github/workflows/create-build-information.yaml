name: Random Commit Automation

on:
#  push:
#    branches:
#      - main
  workflow_dispatch: # Allows manual triggering
  schedule:
    - cron: '36 14 * * *'  # Every day at 2:05pm UTC

jobs:
  commit-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push commits

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean update-file.txt (keep only lines starting with #)
        run: |
          if [ -f update-file.txt ]; then
            grep "^#" update-file.txt > tmp-file.txt && mv tmp-file.txt update-file.txt || echo "" > update-file.txt
          else
            touch update-file.txt
          fi

      - name: Commit Loop with Random Messages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Word banks for generating clean funny commit messages
          VERBS=("Fixed" "Refactored" "Tweaked" "Rewired" "Convinced" "Bribed" "Negotiated with" "Yelled at" "Apologized to" "Blamed" "Sacrificed" "Reverse-engineered" "Accidentally improved" "Politely asked" "Stared menacingly at")
          NOUNS=("the hamsters" "a rogue semicolon" "the coffee machine" "undefined" "the compiler" "production" "the intern" "a rubber duck" "gravity" "the sprint board" "42" "the void" "a time paradox" "the dark arts" "Schrödinger's bug")
          OUTCOMES=("until it worked" "and it worked somehow" "for the last time" "against my better judgment" "while crying softly" "and took full credit" "then immediately reverted it" "and nobody noticed" "with a spoon" "to appease the CI gods" "before standup" "at 4:59pm on a Friday" "and called it a feature" "with zero tests" "and blamed caching")

          ITERATIONS=$(( RANDOM % 5 + 1 ))
          echo "Running $ITERATIONS iterations"

          for i in $(seq 1 $ITERATIONS); do
            # Pick a random entry from each word bank
            VERB="${VERBS[$RANDOM % ${#VERBS[@]}]}"
            NOUN="${NOUNS[$RANDOM % ${#NOUNS[@]}]}"
            OUTCOME="${OUTCOMES[$RANDOM % ${#OUTCOMES[@]}]}"

            CLEAN_MSG="$VERB $NOUN $OUTCOME"

            echo "Iteration $i: $CLEAN_MSG"

            # Append the commit message to update-file.txt
            echo "$CLEAN_MSG" >> update-file.txt

            git add update-file.txt
            git commit -m "$CLEAN_MSG"
          done

      - name: Push All Commits
        run: git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}